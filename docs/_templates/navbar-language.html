<div class="pyna-language-switcher" data-pyna-language-switcher>
  <span class="pyna-language-switcher__label">Language</span>
  <select class="pyna-language-select" aria-label="Documentation language">
    {%- for code, label in pyna_translation_languages.items() %}
    <option value="{{ code }}"{% if code == pyna_current_language %} selected{% endif %}>{{ label }}</option>
    {%- endfor %}
  </select>
</div>
