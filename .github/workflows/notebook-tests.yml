name: Notebook Tests

on:
  push:
    branches: [master]
    paths:
      - 'notebooks/**'
      - 'pyna/**'
      - '.github/workflows/notebook-tests.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  notebook-tests:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python environment
        shell: pwsh
        run: |
          py -3 -m pip install --upgrade pip
          py -3 -m pip install --upgrade numpy scipy matplotlib sympy scikit-image joblib deprecated pandas `
                      jupyter nbmake pytest pytest-timeout ipykernel cupy-cuda12x
          py -3 -m pip install --upgrade --no-build-isolation --no-deps .

      - name: Run tutorial notebooks
        id: nbtest
        shell: pwsh
        run: |
          $result = py -3 -m pytest --nbmake notebooks/tutorials/ `
                        --timeout=600 `
                        -v --tb=short 2>&1
          $result | Tee-Object -FilePath "$env:TEMP\nb_results.txt"
          $exitCode = $LASTEXITCODE

          $lines = Get-Content "$env:TEMP\nb_results.txt"
          $passed = ($lines | Select-String "^PASSED").Count
          $failed = ($lines | Select-String "^FAILED|^ERROR").Count
          $total  = $passed + $failed

          "total=$total"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "passed=$passed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "failed=$failed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          # Job summary
          "## 📓 Notebook Test Results"    | Out-File $env:GITHUB_STEP_SUMMARY -Append
          ""                               | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| Metric | Count |"             | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "|--------|-------|"             | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| ✅ Passed | $passed |"         | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| ❌ Failed | $failed |"         | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| 📊 Total  | $total  |"         | Out-File $env:GITHUB_STEP_SUMMARY -Append

          exit $exitCode
