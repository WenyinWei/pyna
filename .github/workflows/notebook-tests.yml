name: Notebook Tests

on:
  push:
    branches: [master]
    paths:
      - 'notebooks/**'
      - 'pyna/**'
      - '.github/workflows/notebook-tests.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  notebook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy matplotlib sympy scikit-image \
                      jupyter nbmake pytest pytest-timeout ipykernel
          pip install --no-build-isolation --no-deps .
          sudo apt-get install -y pandoc

      - name: Run tutorial notebooks
        id: nbtest
        run: |
          set +e
          pytest --nbmake notebooks/tutorials/ \
                 --timeout=300 \
                 -v --tb=short \
                 2>&1 | tee /tmp/nb_results.txt
          EXIT_CODE=${PIPESTATUS[0]}

          TOTAL=$(grep -E "^(PASSED|FAILED|ERROR)" /tmp/nb_results.txt | wc -l)
          PASSED=$(grep -E "^PASSED" /tmp/nb_results.txt | wc -l)
          FAILED=$(grep -E "^(FAILED|ERROR)" /tmp/nb_results.txt | wc -l)

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

          # Write job summary
          echo "## 📓 Notebook Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Total  | $TOTAL  |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/nb_results.txt | tail -20 >> $GITHUB_STEP_SUMMARY

          exit $EXIT_CODE
