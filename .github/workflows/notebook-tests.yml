name: Notebook Tests

on:
  push:
    branches: [master]
    paths:
      - 'notebooks/**'
      - 'pyna/**'
      - '.github/workflows/notebook-tests.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  notebook-tests:
    runs-on: ubuntu-latest-4-core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade numpy scipy matplotlib sympy scikit-image joblib deprecated pandas \
                      jupyter nbmake pytest pytest-timeout ipykernel
          pip install --upgrade --no-build-isolation --no-deps .
          sudo apt-get install -y pandoc

      - name: Run tutorial notebooks
        id: nbtest
        run: |
          set +e
          pytest --nbmake notebooks/tutorials/ \
                 --timeout=300 \
                 -v --tb=short \
                 2>&1 | tee /tmp/nb_results.txt
          EXIT_CODE=${PIPESTATUS[0]}

          PASSED=$(grep -cE " PASSED" /tmp/nb_results.txt || true)
          FAILED=$(grep -cE " FAILED| ERROR" /tmp/nb_results.txt || true)
          TOTAL=$((PASSED + FAILED))

          echo "total=$TOTAL"   >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

          echo "## 📓 Notebook Test Results"  >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |"           >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|"           >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |"       >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |"       >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Total  | $TOTAL  |"       >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          tail -20 /tmp/nb_results.txt        >> $GITHUB_STEP_SUMMARY

          exit $EXIT_CODE
