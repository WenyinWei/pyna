name: Build and Publish Wheels

# Triggers:
#   - push of a version tag vX.Y.Z  -> build + upload to PyPI
#   - push to master                -> build only (smoke test, no upload)
#   - manual dispatch               -> build; optionally upload
on:
  push:
    branches: [master]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload to PyPI? (yes/no)"
        default: "no"

jobs:
  # ============================================================
  # 1. Build wheels  (Windows / Linux / macOS x Intel+ARM)
  # ============================================================
  build_wheels:
    name: Wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4

      # ── xmake (host runner; cibuildwheel re-uses it via env var) ──────────
      - name: Install xmake (Linux host)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://xmake.io/shget.text | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install xmake (macOS host)
        if: runner.os == 'macOS'
        run: brew install xmake

      - name: Install xmake (Windows host)
        if: runner.os == 'Windows'
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # ── Build wheels ──────────────────────────────────────────────────────
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP:  "*-win32 *-musllinux*"

          # ── Linux (manylinux2014 container) ───────────────────────────────
          # Install xmake inside the container once; expose via CIBW_ENVIRONMENT.
          # xmake installs to ~/.local/bin which is /root/.local/bin in the container.
          CIBW_BEFORE_ALL_LINUX: |
            curl -fsSL https://xmake.io/shget.text | bash || true
            ls ~/.local/bin/xmake 2>/dev/null && echo "xmake ok" || echo "xmake install failed"
          CIBW_ENVIRONMENT_LINUX: "PATH=/root/.local/bin:$PATH"

          # ── macOS ─────────────────────────────────────────────────────────
          # xmake already installed on the runner via brew above;
          # CIBW_BEFORE_ALL is not needed.

          # ── Windows ───────────────────────────────────────────────────────
          # xmake installed via xmake-io/github-action-setup-xmake@v1;
          # it adds itself to the machine PATH so cibuildwheel subprocess sees it.

          # ── All platforms: pybind11 headers before each wheel build ───────
          # Also set CYNA_SKIP_TOOL_INSTALL=1 so setup.py does not try to
          # install xmake/compiler (they are already present in CI).
          CIBW_BEFORE_BUILD: pip install pybind11
          CIBW_ENVIRONMENT_PASS_LINUX: CYNA_SKIP_TOOL_INSTALL
          CIBW_ENVIRONMENT: CYNA_SKIP_TOOL_INSTALL=1

          # ── Test each wheel immediately after building ────────────────────
          CIBW_TEST_COMMAND: >
            python -c "import pyna._cyna as c; assert c.is_available(), 'cyna not available'"
          # arm64 wheels built on x86 runner cannot be executed
          CIBW_TEST_SKIP: "*-macosx_*_arm64 *-macosx_arm64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ============================================================
  # 2. Pure-Python sdist (fallback for exotic platforms)
  # ============================================================
  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      # sdist build does NOT run build_ext (no xmake needed)
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ============================================================
  # 3. Publish to PyPI (tag push or manual upload=yes)
  # ============================================================
  upload_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == 'yes')
    environment:
      name: pypi
      url: https://pypi.org/p/pyna-chaos
    permissions:
      id-token: write   # OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
