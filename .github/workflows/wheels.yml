name: Build and Publish Wheels

# Triggers:
#   - push to master (smoke test only, no upload)
#   - push of a version tag vX.Y.Z  → build + upload to PyPI
#   - manual dispatch (choose whether to upload)
on:
  push:
    branches: [master]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload to PyPI? (yes/no)"
        default: "no"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build wheels for CPython 3.9 – 3.13 on Windows / Linux / macOS
  # ────────────────────────────────────────────────────────────────────────────
  build_wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]
        # macos-13 = Intel x86_64,  macos-14 = Apple-Silicon arm64

    steps:
      - uses: actions/checkout@v4

      # ── Install xmake (needed by setup.py's build_ext) ────────────────────
      - name: Install xmake (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://xmake.io/shget.text | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install xmake (macOS)
        if: runner.os == 'macOS'
        run: brew install xmake

      - name: Install xmake (Windows)
        if: runner.os == 'Windows'
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # ── Build wheels with cibuildwheel ────────────────────────────────────
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          # CPython 3.9 – 3.13; skip PyPy and 32-bit Windows
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *-musllinux_i686"

          # ── Linux: build inside manylinux2014 container ──────────────────
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64
          CIBW_BEFORE_ALL_LINUX: |
            curl -fsSL https://xmake.io/shget.text | bash
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> /etc/profile
            source /etc/profile

          # ── macOS: ensure xmake visible inside build env ─────────────────
          CIBW_BEFORE_ALL_MACOS: which xmake || brew install xmake

          # ── All platforms: install pybind11 before build ─────────────────
          CIBW_BEFORE_BUILD: pip install pybind11

          # ── Run the test suite after building each wheel ─────────────────
          CIBW_TEST_COMMAND: python -c "import pyna._cyna as c; assert c.is_available(), 'cyna unavailable'"
          CIBW_TEST_SKIP: "*-macosx_arm64"   # can't run arm64 on x86 runner

          # ── Pass CN-friendly pip index for pybind11 ──────────────────────
          PIP_INDEX_URL: "https://pypi.org/simple"   # CI has fast GitHub infra

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build the pure-Python sdist (fallback for exotic platforms)
  # ────────────────────────────────────────────────────────────────────────────
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Upload to PyPI (only on version tags or manual dispatch with upload=yes)
  # ────────────────────────────────────────────────────────────────────────────
  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == 'yes')
    environment:
      name: pypi
      url: https://pypi.org/p/pyna-chaos
    permissions:
      id-token: write   # OIDC trusted publishing (no API token needed)

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — configure at:
        # https://pypi.org/manage/project/pyna-chaos/settings/publishing/
