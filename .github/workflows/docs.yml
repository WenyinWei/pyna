name: Build and Publish Docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install docs dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade "sphinx>=7" pydata-sphinx-theme myst-parser nbsphinx sphinx-autodoc-typehints \
                      sphinx-copybutton sphinx-design sphinx-autoapi ipykernel \
                      numpy scipy matplotlib sympy scikit-image joblib deprecated pandas
          pip install --upgrade --no-build-isolation --no-deps .

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build Sphinx docs
        run: |
          cd docs
          rm -rf notebooks
          cp -r ../notebooks notebooks
          make html SPHINXOPTS="-q"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
