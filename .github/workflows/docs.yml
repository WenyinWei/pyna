name: Build and Publish Docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install docs dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade "sphinx>=7" pydata-sphinx-theme myst-parser nbsphinx sphinx-autodoc-typehints \
                      sphinx-copybutton sphinx-design sphinx-autoapi ipykernel \
                      numpy scipy matplotlib sympy scikit-image joblib deprecated pandas
          pip install --upgrade --no-build-isolation --no-deps .

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build Sphinx docs
        run: |
          cd docs
          rm -rf notebooks
          cp -r ../notebooks notebooks
          make html SPHINXOPTS="-q"

      - name: Publish static HTML to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pages_dir="${RUNNER_TEMP}/pyna-pages"
          rm -rf "${pages_dir}"
          mkdir -p "${pages_dir}"
          cp -a docs/_build/html/. "${pages_dir}/"
          touch "${pages_dir}/.nojekyll"

          cd "${pages_dir}"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy docs for ${GITHUB_SHA}"
          git branch -M gh-pages
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
